<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="4; url=home.html">
    <title>Align</title>
    <link rel="stylesheet" href="splashblue.css">
</head>
<body>
    <div class="splash-screen" id="splashScreen">
        <!-- Background Image -->
        <div class="splash-background"></div>
        
        <!-- Overlay for text readability -->
        <div class="splash-overlay"></div>
        
        <div class="splash-content">
            <!-- Website Title -->
            <h1 class="splash-title">Align</h1>
            
            
            
            <!-- Website Mission -->
            <p class="splash-mission">
                Our mission is to make digital collaboration accessible, inclusive, and equitable for everyone — regardless of location, income, language, or background.
            </p>
            
            <!-- Countdown Timer -->
            <div class="countdown-container">
                <p class="countdown-text">Entering site in <span id="countdown">4</span>...</p>
            </div>
            
            <!-- Group Members -->
            <div class="group-members">
                <h3>Group Members</h3>
                <ul>
                    <li>Olu (20250697)</li>
                    <li>Ruhansa (20240786)</li>
                    <li>Senuth (20250673)</li>
                    <li>Zaidh (20241116) </li>
                </ul>
            </div>
            
            <!-- Skip Button -->
            <button class="skip-btn" id="skipBtn" onclick="skipIntro()">Skip Intro</button>
        </div>
    </div>

    <script>
        let countdownValue = 4;
        let autoRedirectTimer;
        let countdownTimer;

        // Countdown Timer Function
        function startCountdown() {
            countdownTimer = setInterval(function() {
                countdownValue--;
                document.getElementById('countdown').textContent = countdownValue;
                
                if (countdownValue === 0) {
                    clearInterval(countdownTimer);
                    redirectToHome();
                }
            }, 1000);
        }

        // Redirect to Home Page
        function redirectToHome() {
            const splashScreen = document.getElementById('splashScreen');
            splashScreen.classList.add('fade-out');
            
            setTimeout(function() {
                window.location.href = 'home.html';
            }, 500);
        }

        // Skip Intro Function
        function skipIntro() {
            clearInterval(countdownTimer);
            clearInterval(autoRedirectTimer);
            redirectToHome();
        }

        // Start the countdown when page loads
        window.addEventListener('load', function() {
            startCountdown();
        });
    </script>
</body>
</html>
